; Klipputer — pocket KlipperScreen for M5Stack Cardputer ADV
; Board config matches range-toolkit/cardmeleon exactly: NO PSRAM flags
; (this unit's PSRAM is broken — cardmeleon learning #5), USB CDC flags
; required for serial monitor over the built-in USB port.
[env:m5stack-cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200

build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    m5stack/M5Cardputer@^1.1.1
    bblanchon/ArduinoJson@^7.0.4
    links2004/WebSockets@^2.4.1
